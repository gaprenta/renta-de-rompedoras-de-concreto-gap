<script>
    // BASE DE DATOS REFINADA POR PERÍMETROS DESDE VALLE SUR
    const baseZonas = [
        { 
            // PERÍMETRO 1: VECINOS DIRECTOS (COSTO MÍNIMO)
            palabras: ["valle sur", "san roque", "santa monica", "anzures", "villas de san jose", "mirador del parque", "palo blanco", "terranova", "ex hacienda", "juarez centro", "valle real", "montecristal", "la trinidad", "real de juarez", "acueducto", "los puertos", "lomas de juarez"], 
            zona: "Juárez Local (Zona Base)", costo: 200 
        },
        { 
            // PERÍMETRO 2: GUADALUPE ORIENTE (CERCANÍA MEDIA)
            palabras: ["tres caminos", "coahuila", "xochimilco", "dos rios", "el porvenir", "paseo gpe", "eloy cavazos", "villas de san miguel", "faisanes", "balcones de san miguel", "rancho viejo", "azueta", "guadalupe centro", "pablo livas", "valles de guadalupe"], 
            zona: "Guadalupe Oriente", costo: 250 
        },
        { 
            // PERÍMETRO 3: CENTRO DE GPE / LINDAVISTA
            palabras: ["la pastora", "vivienda popular", "expo", "estadio", "tolteca", "lindavista", "contry", "la silla", "santa maria", "san sebastian", "residencial azteca", "huinala", "pueblo nuevo"], 
            zona: "Guadalupe Poniente / Apodaca Sur", costo: 300 
        },
        { 
            // PERÍMETRO 4: ÁREA METROPOLITANA INTERMEDIA
            palabras: ["centro de apodaca", "la fe", "santa rosa", "margaritas", "alameda", "ebano", "concordia", "metroplex", "encarnacion", "moises saenz", "mirasol", "paseo de las flores", "san nicolas center", "las puentes", "universidad", "anahuac", "cuauhtemoc", "sendero"], 
            zona: "San Nicolás / Apodaca Norte", costo: 400 
        },
        { 
            // PERÍMETRO 5: ZONAS RETIRADAS (CUMBRES / SAN PEDRO / GARCÍA)
            palabras: ["mty centro", "zona tec", "obispado", "mitras", "san bernabe", "solidaridad", "cumbres", "san jeronimo", "santa catarina", "garcia", "dominio", "san pedro", "valle oriente", "la estanzuela", "carretera nacional", "el uro", "santiago", "escobedo", "puerta de hierro"], 
            zona: "Zona Periferia (Larga Distancia)", costo: 550 
        }
    ];

    function detectarZona() {
        const input = document.getElementById('coloniaInput').value.toLowerCase();
        const infoZona = document.getElementById('infoZona');
        const fleteInput = document.getElementById('costoFlete');
        const nombreZonaInput = document.getElementById('nombreZona');
        
        let zonaEncontrada = null;

        // Si el cliente no ha escrito nada o escribe muy poco, 
        // asumimos que es de la zona local para no mostrar flete alto de inicio.
        if (input.length < 3) {
            infoZona.innerText = "Escriba su colonia para validar flete...";
            infoZona.style.background = "#002752";
            infoZona.style.color = "#FFCD00";
            fleteInput.value = 200; // Flete inicial justo
            nombreZonaInput.value = "Juárez Local";
            return;
        }

        // Buscador de coincidencias en la base de datos
        for (let z of baseZonas) {
            for (let p of z.palabras) {
                if (input.includes(p)) {
                    zonaEncontrada = z;
                    break;
                }
            }
            if (zonaEncontrada) break;
        }

        if (zonaEncontrada) {
            infoZona.innerText = "✓ Cobertura Confirmada en " + zonaEncontrada.zona;
            infoZona.style.background = "#25D366"; 
            infoZona.style.color = "#fff";
            fleteInput.value = zonaEncontrada.costo;
            nombreZonaInput.value = zonaEncontrada.zona;
        } else {
            // Si la colonia no está en la lista pero el cliente ya escribió, 
            // ponemos un flete promedio razonable.
            infoZona.innerText = "Calculando logística para sector nuevo...";
            infoZona.style.background = "#FFCD00";
            infoZona.style.color = "#000";
            fleteInput.value = 300; 
            nombreZonaInput.value = "Zona General";
        }
    }
</script>
